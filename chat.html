<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Vandox</title>
    <link rel="stylesheet" href="stayl.css">
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="navbar_2">
        <div class="header">
            <div class="navbar">
                <a href="index.html">الرئيسي</a>
            </div>
        </div>
    </div>

    <div class="user-profile">
        <div class="profile-trigger" onclick="toggleMenu()">
            <span id="display-name">تحميل...</span>
            <img id="profile-img" src="default-avatar.png" alt="Profile">
        </div>
        
        <div class="profile-menu" id="profileMenu" style="display:none;">
            <label for="imageInput">🖼️ تغيير الصورة</label>
            <input type="file" id="imageInput" style="display:none" onchange="uploadImage(this)">
            <button onclick="deleteAccount()" style="color: #ff4757;">🗑️ حذف الحساب</button>
            <button onclick="logout()">🚪 تسجيل الخروج</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-box" class="chat-messages"></div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHerXxCb6wqeHvUXuFB5KOiKcVHg4jEeU",
    authDomain: "vandox.firebaseapp.com",
    databaseURL: "https://vandox-default-rtdb.firebaseio.com",
    projectId: "vandox",
    storageBucket: "vandox.firebasestorage.app",
    messagingSenderId: "953994388305",
    appId: "1:953994388305:web:8c592dd98f764fb931e970"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const database = firebase.database();
const chatBox = document.getElementById("chat-box");
const messageInput = document.getElementById("message-input");

// 🔊 صوت الإشعار (حط ملف داخل مشروعك: sounds/notify.mp3)
const notificationSound = new Audio("sound/سناب-شات.mp3");
notificationSound.volume = 0.8;

// باش مايعطيش إشعارات فالأول
let firstLoad = true;

// --------------------
// Scroll لتحت
// --------------------
function scrollChatToBottom() {
    setTimeout(() => {
        chatBox.scrollTop = chatBox.scrollHeight;
    }, 100);
}

// --------------------
// Profile UI
// --------------------
function updateProfileUI() {
    const isLoggedIn = localStorage.getItem("isLoggedIn");
    const storedUser = JSON.parse(localStorage.getItem("localUser"));
    const savedAvatar = localStorage.getItem("userAvatar");

    if (isLoggedIn === "true" && storedUser) {
        document.getElementById("display-name").innerText = storedUser.displayName;
        if (savedAvatar) document.getElementById("profile-img").src = savedAvatar;
    } else {
        window.location.href = "login.html";
    }
}
updateProfileUI();

// --------------------
// إرسال رسالة
// --------------------
function sendMessage() {
    const text = messageInput.value.trim();
    const storedUser = JSON.parse(localStorage.getItem("localUser"));
    const savedAvatar = localStorage.getItem("userAvatar") || "default-avatar.png";

    if (text !== "" && storedUser) {
        database.ref("messages").push({
            username: storedUser.displayName,
            text: text,
            avatar: savedAvatar,
            timestamp: Date.now()
        }).then(() => {
            messageInput.value = "";
            scrollChatToBottom();
        });
    }
}

// Enter للإرسال
function handleKeyPress(e) {
    if (e.key === "Enter") sendMessage();
}

// --------------------
// Toast Notification
// --------------------
function showToast(message) {
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 3000);
}

// --------------------
// حذف رسالة
// --------------------
window.deleteMessage = function (key) {
    if (confirm("هل تريد حذف الرسالة ؟")) {
        database.ref("messages/" + key).remove();
    }
};

// --------------------
// عرض الرسائل
// --------------------
function displayMessage(data, key) {
    const storedUser = JSON.parse(localStorage.getItem("localUser"));
    const isMe = storedUser && data.username === storedUser.displayName;

    const msgHtml = `
        <div class="message ${isMe ? "my-message" : ""}" id="msg-${key}">
            <img src="${data.avatar}" class="chat-avatar" onerror="this.src='default-avatar.png'">
            <div class="msg-content">
                <span class="user-name">${data.username}</span>
                <p class="text">${data.text}</p>

                ${isMe ? `
                    <span class="delete-btn" onclick="deleteMessage('${key}')">
                        🗑️ حذف
                    </span>
                ` : ""}
            </div>
        </div>
    `;

    chatBox.innerHTML += msgHtml;
}

// --------------------
// Firebase listener (مهم)
// --------------------
database.ref("messages").limitToLast(30).on("child_added", (snapshot) => {
    const data = snapshot.val();
    const key = snapshot.key;

    displayMessage(data, key);
    scrollChatToBottom();

    const me = JSON.parse(localStorage.getItem("localUser"));

    // إشعار + صوت
    if (!firstLoad && me && data.username !== me.displayName) {
        showToast(`💬 رسالة جديدة من ${data.username}`);

        notificationSound.currentTime = 0;
        notificationSound.play().catch(() => {});
    }
});

// حذف من الواجهة
database.ref("messages").on("child_removed", (snapshot) => {
    const el = document.getElementById("msg-" + snapshot.key);
    if (el) el.remove();
});

// بعد أول تحميل
setTimeout(() => {
    firstLoad = false;
}, 2000);

// --------------------
// صوت unlock (مهم للمتصفح)
// --------------------
document.addEventListener("click", () => {
    notificationSound.play().catch(() => {});
}, { once: true });

// --------------------
// UI functions
// --------------------
window.toggleMenu = function () {
    const menu = document.getElementById("profileMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
};

window.logout = function () {
    localStorage.setItem("isLoggedIn", "false");
    window.location.href = "login.html";
};

window.uploadImage = function (input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();

        reader.onload = function (e) {
            document.getElementById("profile-img").src = e.target.result;
            localStorage.setItem("userAvatar", e.target.result);
        };

        reader.readAsDataURL(input.files[0]);
    }
};

</script>
</body>
</html>
