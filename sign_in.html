<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب | Vandox YT</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f0f13; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .auth-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 20px; border: 1px solid rgba(0, 255, 255, 0.2); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        .auth-card h2 { margin-bottom: 30px; color: aqua; font-size: 28px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 16px; box-sizing: border-box; }
        .input-group input:focus { outline: none; border-color: aqua; background: rgba(255, 255, 255, 0.08); }
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background-color: aqua; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4); }
        p { margin-top: 25px; font-size: 14px; color: #b2bec3; }
        p a { color: aqua; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2>إنشاء حساب جديد</h2>
        <form id="signupForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم" required>
            </div>
            <div class="input-group">
                <input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <input type="password" id="signupPassword" placeholder="كلمة السر" required>
            </div>
            <button type="submit" class="btn-main">تسجيل</button>
        </form>
        <p>لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a></p>
    </div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseURL = 'https://oalsswnamgkoz.supabase.co'; 
    const supabaseKey = 'sb_publicable_04f1NYVqbWriXXM5Pqy_bQ_cnpFHP...';

    const supabase = createClient(supabaseURL, supabaseKey);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;

        const { data, error } = await supabase.auth.signUp({
            email: email,
            password: password,
            options: {
                data: { display_name: username }
            }
        });

        if (error) {
            alert("خطأ في إنشاء الحساب: " + error.message);
        } else {
            alert("تم إنشاء الحساب! يرجى التحقق من بريدك الإلكتروني (أو سجل الدخول مباشرة إذا كنت قد عطلت Confirm Email في Supabase).");
            window.location.href = "login.html";
        }
    });
</script>
</body>
</html>
