<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول | Vandox YT</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f0f13; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; }
        .auth-card { background: rgba(255, 255, 255, 0.03); padding: 40px; border-radius: 20px; border: 1px solid rgba(0, 255, 255, 0.2); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); }
        .auth-card h2 { margin-bottom: 30px; color: aqua; font-size: 28px; }
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 16px; box-sizing: border-box; }
        .input-group input:focus { outline: none; border-color: aqua; background: rgba(255, 255, 255, 0.08); }
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background-color: aqua; color: #000; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4); }
        p { margin-top: 25px; font-size: 14px; color: #b2bec3; }
        p a { color: aqua; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="كلمة السر" required>
            </div>
            <button type="submit" class="btn-main">دخول</button>
        </form>
        <p>ليس لديك حساب؟ <a href="sign_in.html">إنشاء حساب جديد</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('http://localhost:3000/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.status === 404) {
                    alert("أنشئ حساب أولاً!");
                    window.location.href = "sign_in.html";
                } else if (response.status === 401) {
                    alert("كلمة المرور خاطئة!");
                } else if (response.ok) {
                    // حفظ الإيميل في المتصفح قبل التوجيه للإنديكس
                    localStorage.setItem('userEmail', email); 
                    alert("تم تسجيل الدخول بنجاح!");
                    window.location.href = "index.html";
                }
            } catch (error) {
                alert("تأكد أن السيرفر شغال!");
            }
        });
    </script>
</body>
</html>
