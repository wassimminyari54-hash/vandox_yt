<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Vandox</title>
    <link rel="stylesheet" href="stayl.css">
</head>
<body>
    <div class="navbar_2">
        <div class="header">
            <div class="navbar">
                <a href="index.html">الرئيسي</a>
            </div>
        </div>
    </div>

    <div class="user-profile">
        <div class="profile-trigger" onclick="toggleMenu()">
            <span id="display-name">تحميل...</span>
            <img id="profile-img" src="default-avatar.png" alt="Profile">
        </div>
        
        <div class="profile-menu" id="profileMenu" style="display:none;">
            <label for="imageInput">🖼️ تغيير الصورة</label>
            <input type="file" id="imageInput" style="display:none" onchange="uploadImage(this)">
            <button onclick="deleteAccount()" style="color: #ff4757;">🗑️ حذف الحساب</button>
            <button onclick="logout()">🚪 تسجيل الخروج</button>
        </div>
    </div>

    <div class="chat-container">
        <div id="chat-box" class="chat-messages"></div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="send-btn">إرسال</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

<script>
    // 1. إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAHerXxCb6wqeHvUXuFB5KOiKcVHg4jEeU",
        authDomain: "vandox.firebaseapp.com",
        databaseURL: "https://vandox-default-rtdb.firebaseio.com",
        projectId: "vandox",
        storageBucket: "vandox.firebasestorage.app",
        messagingSenderId: "953994388305",
        appId: "1:953994388305:web:8c592dd98f764fb931e970"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();

    const chatBox = document.getElementById('chat-box');
    const messageInput = document.getElementById('message-input');

    // 2. تحديث واجهة المستخدم من LocalStorage (نفس منطق الصفحة الرئيسية)
    function updateProfileUI() {
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const storedUser = JSON.parse(localStorage.getItem('localUser'));
        const savedAvatar = localStorage.getItem('userAvatar');

        if (isLoggedIn === 'true' && storedUser) {
            document.getElementById('display-name').innerText = storedUser.displayName;
            if (savedAvatar) {
                document.getElementById('profile-img').src = savedAvatar;
            }
        } else {
            // إيلا ما مسجلش يرجع لصفحة اللوكن
            window.location.href = "login.html";
        }
    }

    // تشغيل التحديث فوراً
    updateProfileUI();

    // 3. إرسال الرسالة
    function sendMessage() {
        const text = messageInput.value;
        const storedUser = JSON.parse(localStorage.getItem('localUser'));
        const savedAvatar = localStorage.getItem('userAvatar') || 'default-avatar.png';

        if (text.trim() !== "" && storedUser) {
            database.ref('messages').push({
                username: storedUser.displayName,
                text: text,
                avatar: savedAvatar,
                timestamp: Date.now()
            }).then(() => {
                messageInput.value = ""; 
            });
        }
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') sendMessage();
    }

    // 4. عرض الرسائل
    database.ref('messages').limitToLast(30).on('child_added', (snapshot) => {
        const data = snapshot.val();
        const storedUser = JSON.parse(localStorage.getItem('localUser'));
        const isMe = storedUser && data.username === storedUser.displayName;

        const msgHtml = `
            <div class="message ${isMe ? 'my-message' : ''}">
                <img src="${data.avatar}" class="chat-avatar" onerror="this.src='default-avatar.png'">
                <div class="msg-content">
                    <span class="user-name">${data.username}</span>
                    <p class="text">${data.text}</p>
                </div>
            </div>
        `;
        chatBox.innerHTML += msgHtml;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // 5. دوال القائمة (نفس اللي في الصفحة الرئيسية)
    window.toggleMenu = function() {
        const menu = document.getElementById('profileMenu');
        menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    };

    window.logout = function() {
        localStorage.setItem('isLoggedIn', 'false');
        window.location.href = "login.html";
    };

    window.uploadImage = function(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageData = e.target.result;
                document.getElementById('profile-img').src = imageData;
                localStorage.setItem('userAvatar', imageData);
                // تحديث الصورة في الرسائل المستقبلية أيضاً
            };
            reader.readAsDataURL(input.files[0]);
        }
    };
</script>
</body>
</html>
